name = "assort"
locale = "ko"
min_df = 2
max_df_ratio = 0.5
min_phrase_len = 2
max_phrase_len = 30

# 상품명, 리뷰 등에서 흔히 나오는 불용어
stopwords_extra = [
    "테이블", "행", "주문", "반품", "교환",
    "있음", "없음", "입니다", "합니다",
]

[ontology_hints]
"products"         = "ENTITY"
"product_variants" = "ENTITY"
"orders"           = "EVENT"
"reviews"          = "OBSERVATION"
"broadcasts"       = "EVENT"
"sales_channels"   = "CONCEPT"
"sales_partners"   = "CONCEPT"
"colors"           = "CONCEPT"
"sizes"            = "CONCEPT"
"variant_sales"    = "OBSERVATION"

# v0.17.1 — query-to-table hints.
# When a hint keyword appears in the query, EvidenceSearch augments
# seeds with a targeted FTS for that table and boosts existing seeds
# whose ``_table_name`` matches. Fixes regressions like
# "LBL코리아 판매 파트너" that would otherwise drown in product hits.
[table_query_hints]
sizes            = ["사이즈", "size"]
sales_partners   = ["파트너", "판매처", "판매 파트너"]
sales_channels   = ["채널", "판매 채널"]
reviews          = ["리뷰", "후기"]
orders           = ["주문", "오더"]
broadcasts       = ["방송", "라방"]
colors           = ["색상", "컬러"]
products         = ["상품", "제품"]
product_variants = ["옵션", "variant"]
